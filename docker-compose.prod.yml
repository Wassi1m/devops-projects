version: '3.9'

services:

  # ==================== DATABASE ====================
  postgres:
    image: postgres:16-alpine
    container_name: bourseia-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-bourseia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret123}
      POSTGRES_DB: ${DB_NAME:-bourseia_db}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bourseia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - coin-network

  # ==================== API ====================
  api:
    image: ${API_IMAGE:-ghcr.io/wassi1m/devops-projects/bourseia-api:main}
    container_name: bourseia-api
    restart: always
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      coin-ai:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=bourseia_db;Username=bourseia;Password=secret123"
      DetectionApi__Url: "http://coin-ai:8000/predict"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "bourseia-api"
    networks:
      - coin-network

  # ==================== AI ====================
  coin-ai:
    image: ${AI_IMAGE:-ghcr.io/wassi1m/devops-projects/coin-ai:main}
    container_name: coin_ai_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_SERVICE_NAME: "coin-ai"
    volumes:
      - ./coin_ai/data_set:/app/data_set:ro
      - ./coin_ai/models:/app/models:ro
    networks:
      - coin-network

  # ==================== OBSERVABILITY ====================

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - coin-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
    networks:
      - coin-network

  # ==================== PROMETHEUS ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - coin-network

  # ==================== GRAFANA ====================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    networks:
      - coin-network
    depends_on:
      - prometheus

  # ==================== LOKI ====================
  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - coin-network

  # ==================== PROMTAIL (FIX IMPORTANT) ====================
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml
    networks:
      - coin-network
    depends_on:
      - loki

  # ==================== ALERTMANAGER (FIX CRITIQUE) ====================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    volumes:
      - ./observability/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - coin-network

  # ==================== METRICS ====================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - coin-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080"
    privileged: true
    networks:
      - coin-network

# ==================== VOLUMES ====================
volumes:
  pg_data:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

networks:
  coin-network:
    driver: bridge