# Global settings
global:
  environment: production
  imageRegistry: docker.io
  imagePullPolicy: IfNotPresent

# Namespace
namespace:
  create: true
  name: coin-system

# Database Configuration
database:
  enabled: true
  type: postgresql
  host: postgres
  port: 5432
  credentials:
    username: bourseia
    password: secret123
    database: bourseia_db
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# API Service
api:
  enabled: true
  replicaCount: 3
  image:
    repository: bourseia-api
    tag: latest
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5

# AI Service
ai:
  enabled: true
  replicaCount: 2
  image:
    repository: coin-ai
    tag: latest
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      memory: "512Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 85
  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10

# Observability Stack
observability:
  # Prometheus
  prometheus:
    enabled: true
    replicaCount: 1
    image:
      repository: prom/prometheus
      tag: latest
    service:
      type: ClusterIP
      port: 9090
    persistence:
      enabled: true
      size: 20Gi
      storageClass: standard
    retention: 30d
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "500m"

  # Grafana
  grafana:
    enabled: true
    replicaCount: 1
    image:
      repository: grafana/grafana
      tag: latest
    service:
      type: LoadBalancer
      port: 3000
    persistence:
      enabled: true
      size: 5Gi
      storageClass: standard
    adminUser: admin
    adminPassword: admin123
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

  # Loki
  loki:
    enabled: true
    replicaCount: 1
    image:
      repository: grafana/loki
      tag: latest
    service:
      type: ClusterIP
      port: 3100
    persistence:
      enabled: true
      size: 10Gi
      storageClass: standard
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

  # Jaeger
  jaeger:
    enabled: true
    replicaCount: 1
    image:
      repository: jaegertracing/all-in-one
      tag: latest
    service:
      type: ClusterIP
      ports:
        grpc: 14250
        ui: 16686
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "1Gi"
        cpu: "500m"

  # OpenTelemetry Collector
  otelCollector:
    enabled: true
    replicaCount: 1
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: latest
    service:
      type: ClusterIP
      ports:
        otlpGrpc: 4317
        otlpHttp: 4318
        prometheus: 8888
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "250m"

  # Alertmanager
  alertmanager:
    enabled: true
    replicaCount: 1
    image:
      repository: prom/alertmanager
      tag: latest
    service:
      type: ClusterIP
      port: 9093
    resources:
      requests:
        memory: "128Mi"
        cpu: "50m"
      limits:
        memory: "256Mi"
        cpu: "100m"

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-tls
      hosts:
        - api.example.com
    - secretName: grafana-tls
      hosts:
        - grafana.example.com

# Monitoring
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
  prometheusRule:
    enabled: true

# Security
security:
  rbac:
    enabled: true
  networkPolicy:
    enabled: true
  podSecurityPolicy:
    enabled: false

# Backup and Disaster Recovery
backup:
  enabled: false
  schedule: "0 2 * * *"
  retention: 30

