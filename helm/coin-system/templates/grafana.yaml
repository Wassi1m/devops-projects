{{- if .Values.observability.grafana.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "coin-system.fullname" . }}-grafana-datasources
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "coin-system.fullname" . }}-prometheus:9090
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 30s
          queryTimeout: 60s
      - name: Loki
        type: loki
        access: proxy
        url: http://{{ include "coin-system.fullname" . }}-loki:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "traceID=(\\w+)"
              name: TraceID
              url: "$${__value.raw}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coin-system.fullname" . }}-grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
    app: grafana
spec:
  replicas: {{ .Values.observability.grafana.replicaCount }}
  selector:
    matchLabels:
      {{- include "coin-system.selectorLabels" . | nindent 6 }}
      app: grafana
  template:
    metadata:
      labels:
        {{- include "coin-system.selectorLabels" . | nindent 8 }}
        app: grafana
    spec:
      containers:
      - name: grafana
        image: "{{ .Values.observability.grafana.image.repository }}:{{ .Values.observability.grafana.image.tag }}"
        ports:
        - name: http
          containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          value: {{ .Values.observability.grafana.adminUser | quote }}
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "coin-system.fullname" . }}-grafana-secret
              key: admin-password
        - name: GF_USERS_ALLOW_SIGN_UP
          value: "false"
        - name: GF_INSTALL_PLUGINS
          value: "grafana-clock-panel,grafana-simple-json-datasource,grafana-piechart-panel"
        resources:
          {{- toYaml .Values.observability.grafana.resources | nindent 12 }}
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: {{ include "coin-system.fullname" . }}-grafana-pvc
      - name: grafana-datasources
        configMap:
          name: {{ include "coin-system.fullname" . }}-grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coin-system.fullname" . }}-grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
spec:
  type: {{ .Values.observability.grafana.service.type }}
  selector:
    {{- include "coin-system.selectorLabels" . | nindent 4 }}
    app: grafana
  ports:
  - port: {{ .Values.observability.grafana.service.port }}
    targetPort: http
    name: http
    protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "coin-system.fullname" . }}-grafana-pvc
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.observability.grafana.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.observability.grafana.persistence.size }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "coin-system.fullname" . }}-grafana-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.observability.grafana.adminPassword | quote }}
{{- end }}