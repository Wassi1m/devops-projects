{{- if .Values.ai.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coin-system.fullname" . }}-ai
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
    app: coin-ai
spec:
  {{- if not .Values.ai.autoscaling.enabled }}
  replicas: {{ .Values.ai.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "coin-system.selectorLabels" . | nindent 6 }}
      app: coin-ai
  template:
    metadata:
      labels:
        {{- include "coin-system.selectorLabels" . | nindent 8 }}
        app: coin-ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "coin-system.fullname" . }}-ai
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: coin-ai
        image: "{{ .Values.global.imageRegistry }}/{{ .Values.ai.image.repository }}:{{ .Values.ai.image.tag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://{{ include "coin-system.fullname" . }}-otel-collector:4317"
        - name: OTEL_SERVICE_NAME
          value: "coin-ai"
        resources:
          {{- toYaml .Values.ai.resources | nindent 12 }}
        {{- with .Values.ai.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}
        {{- with .Values.ai.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 12 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "coin-system.fullname" . }}-ai
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
    app: coin-ai
spec:
  type: {{ .Values.ai.service.type }}
  selector:
    {{- include "coin-system.selectorLabels" . | nindent 4 }}
    app: coin-ai
  ports:
  - port: {{ .Values.ai.service.port }}
    targetPort: http
    protocol: TCP
    name: http

{{- if .Values.ai.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "coin-system.fullname" . }}-ai-hpa
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "coin-system.fullname" . }}-ai
  minReplicas: {{ .Values.ai.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.ai.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.ai.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.ai.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}

{{- if .Values.security.rbac.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "coin-system.fullname" . }}-ai
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "coin-system.labels" . | nindent 4 }}
{{- end }}
{{- end }}

