name: Infrastructure Tests

on:
  pull_request:
    paths:
      - 'k8s/**'
      - 'helm/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/infra-tests.yml'

jobs:
  # ─── Validation des manifestes Kubernetes ───────────────────
  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION=$(curl -s https://api.github.com/repos/yannh/kubeconform/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes base manifests
        run: |
          find k8s/base -name '*.yaml' -type f | \
            xargs kubeconform \
              -strict \
              -ignore-missing-schemas \
              -schema-location default \
              -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: Run Kustomize build (syntax check)
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
          kustomize build k8s/base/ > /dev/null && echo "✓ Kustomize build OK"

  # ─── Validation du chart Helm ───────────────────────────────
  validate-helm:
    name: Validate Helm Chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: |
          helm lint helm/coin-system --strict
          echo "✓ Helm lint OK"

      - name: Template Helm chart (dry-run)
        run: |
          helm template coin-system helm/coin-system \
            --values helm/coin-system/values.yaml \
            --namespace coin-system \
            > /tmp/helm-rendered.yaml
          echo "✓ Helm template OK ($(wc -l < /tmp/helm-rendered.yaml) lines rendered)"

      - name: Validate rendered Helm manifests
        run: |
          KUBECONFORM_VERSION=$(curl -s https://api.github.com/repos/yannh/kubeconform/releases/latest | grep tag_name | cut -d '"' -f 4)
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -strict -ignore-missing-schemas /tmp/helm-rendered.yaml && echo "✓ Helm manifests valid"

  # ─── Validation Docker Compose ──────────────────────────────
  validate-docker-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose syntax
        run: |
          docker compose -f docker-compose.prod.yml config > /dev/null
          echo "✓ Docker Compose syntax OK"

      - name: Check services defined
        run: |
          SERVICES=$(docker compose -f docker-compose.prod.yml config --services)
          echo "Services définis: $SERVICES"
          echo "$SERVICES" | grep -q "api" && echo "✓ api présent"
          echo "$SERVICES" | grep -q "postgres" && echo "✓ postgres présent"
          echo "$SERVICES" | grep -q "prometheus" && echo "✓ prometheus présent"
          echo "$SERVICES" | grep -q "grafana" && echo "✓ grafana présent"
          echo "$SERVICES" | grep -q "loki" && echo "✓ loki présent"

  # ─── Scan de sécurité Trivy sur les configs ─────────────────
  security-config-scan:
    name: Security Config Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Trivy config scan (Kubernetes)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'k8s/'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Trivy config scan (Docker Compose)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'docker-compose.prod.yml'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Trivy config scan (Helm)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'helm/'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
