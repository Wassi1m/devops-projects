name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:
  # ─── Qualité du code ────────────────────────────────────────
  lint-and-test:
    name: Lint, Test & SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET dependencies
        run: dotnet restore projet/BourseIA/BourseIA.csproj

      - name: Build .NET
        run: dotnet build projet/BourseIA/BourseIA.csproj --no-restore -c Release

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install -r coin_ai/requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint Python (flake8)
        run: |
          flake8 coin_ai/ --max-line-length=120 --exclude=venv,__pycache__,data_set,models || true

      - name: SonarCloud Analysis
        uses: SonarSource/sonarcloud-github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=bourseia_coin-system
            -Dsonar.organization=bourseia

  # ─── Scan de sécurité (indépendant, tourne sur PR et push) ──
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Run Trivy — filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          severity: 'CRITICAL,HIGH'

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy — summary table
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          severity: 'CRITICAL,HIGH'

  # ─── Build image API ────────────────────────────────────────
  build-api:
    name: Build & Push API Image
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/bourseia-api
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./projet/BourseIA
          file: ./projet/BourseIA/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan built image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/bourseia-api:${{ github.sha }}
          format: 'table'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

  # ─── Build image IA ─────────────────────────────────────────
  build-ai:
    name: Build & Push AI Image
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/coin-ai
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push AI image
        uses: docker/build-push-action@v5
        with:
          context: ./coin_ai
          file: ./coin_ai/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Déploiement Staging ────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [build-api, build-ai]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://api-staging.example.com
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy to Staging with Helm
        run: |
          helm upgrade --install coin-system ./helm/coin-system \
            --namespace coin-system \
            --create-namespace \
            -f helm/coin-system/values.yaml \
            --set api.image.tag=${{ github.sha }} \
            --set ai.image.tag=${{ github.sha }} \
            --timeout 5m

      - name: Smoke test staging
        run: |
          sleep 30
          curl -f https://api-staging.example.com/health || exit 1

  # ─── Déploiement Production ─────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [build-api, build-ai]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://api.example.com
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            ## Release v${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy to Production with Helm
        run: |
          helm upgrade --install coin-system ./helm/coin-system \
            --namespace coin-system \
            --create-namespace \
            -f helm/coin-system/values.yaml \
            --set api.image.tag=${{ github.sha }} \
            --set ai.image.tag=${{ github.sha }} \
            --timeout 10m

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/api -n coin-system --timeout=5m
          kubectl rollout status deployment/coin-ai -n coin-system --timeout=5m
          curl -f https://api.example.com/health || exit 1

      - name: Slack Notification
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ job.status == 'success' && '✅' || '❌' }} Production Deployment v${{ github.run_number }}*\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`\nStatus: *${{ job.status }}*"
                  }
                }
              ]
            }
