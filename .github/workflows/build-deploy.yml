name: Build and Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1
  BUILDKIT_PROGRESS: plain

jobs:

# ─────────────────────────────────────────────
# 1. LINT + TEST + SONAR
# ─────────────────────────────────────────────
  lint-and-test:
    name: Lint, Test 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ─── .NET FIX (chemin correct projet) ─────────────────────
      - name: Restore .NET dependencies
        run: dotnet restore projet/BourseIA/BourseIA.csproj

      - name: Build .NET
        run: dotnet build projet/BourseIA/BourseIA.csproj --no-restore -c Release

      - name: Test .NET
        run: dotnet test projet/BourseIA/BourseIA.csproj --no-build --verbosity normal
      # ─── Python ───────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify structure (debug)
        run: |
          pwd
          ls -la
          ls -la coin_ai
          ls -la coin_ai/requirements.txt

      - name: Install Python dependencies
        working-directory: coin_ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint Python (flake8)
        working-directory: coin_ai
        run: |
          flake8 . --max-line-length=120 --exclude=venv,__pycache__,data_set,models || true
 
# ─────────────────────────────────────────────
# 2. SECURITY SCAN (TRIVY)
# ─────────────────────────────────────────────
  security-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          trivyignores: .trivyignore
          severity: CRITICAL,HIGH

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy summary
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          trivyignores: .trivyignore
          severity: CRITICAL,HIGH


# ─────────────────────────────────────────────
# 3. BUILD API IMAGE
# ─────────────────────────────────────────────
  build-api:
    name: Build & Push API Image
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/bourseia-api

      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./projet/BourseIA
          file: ./projet/BourseIA/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ─────────────────────────────────────────────
# 4. BUILD AI IMAGE
# ─────────────────────────────────────────────
  build-ai:
    name: Build & Push AI Image
    needs: [lint-and-test, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/coin-ai

      - name: Build & Push AI
        uses: docker/build-push-action@v5
        with:
          context: ./coin_ai
          file: ./coin_ai/Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────
# 5. DEPLOY — SSH → VM → docker compose up
# ─────────────────────────────────────────────
  deploy-production:
    name: Deploy to Server (SSH + Docker Compose)
    needs: [build-api, build-ai]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Aller dans le répertoire du projet sur le serveur
            cd ~/devops-projects

            # Récupérer la dernière version du code
            git pull origin main

            # Se connecter au registry GHCR pour puller les images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u ${{ github.actor }} --password-stdin

            # Mettre à jour les images (pull depuis ghcr.io)
            docker-compose -f docker-compose.prod.yml pull


            # Redémarrer les conteneurs mis à jour sans couper les autres
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # Nettoyer les anciennes images inutilisées
            docker image prune -f

            # Vérification santé
            sleep 15
            curl -fs http://localhost:5000/health && echo "✅ API OK" || echo "⚠️ API health check failed"
            curl -fs http://localhost:8000/health && echo "✅ AI OK" || echo "⚠️ AI health check failed"