sonar.projectKey=bourseia_coin-system
sonar.organization=bourseia
sonar.projectName=BourseIA - Coin System
sonar.projectVersion=1.0.0

# Sources
sonar.sources=projet/BourseIA,coin_ai

# .NET coverage
sonar.cs.opencover.reportsPaths=**/TestResults/**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/TestResults/**/*.trx

# Python coverage
sonar.python.coverage.reportPaths=coin_ai/coverage.xml
sonar.python.version=3.11

# Exclusions
sonar.exclusions=\
  **/bin/**,\
  **/obj/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/migrations/**,\
  **/wwwroot/**,\
  **/*.min.js,\
  **/data_set/**,\
  **/models/**,\
  **/charts/**

# Test sources
sonar.test.inclusions=\
  **/*Tests/**,\
  **/*Test.cs,\
  **/test_*.py,\
  **/*_test.py

# Coverage exclusions
sonar.coverage.exclusions=\
  **/Program.cs,\
  **/Migrations/**,\
  **/Data/AppDbContext.cs

sonar.host.url=https://sonarcloud.io
sonar.scm.provider=git
