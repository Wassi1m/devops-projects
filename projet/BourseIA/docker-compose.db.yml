version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: bourseia-postgres
    restart: always
    environment:
      POSTGRES_USER: bourseia
      POSTGRES_PASSWORD: secret123
      POSTGRES_DB: bourseia_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
