apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../base

namePrefix: prod-

commonLabels:
  environment: production
  tier: prod

replicas:
  - name: api
    count: 5
  - name: coin-ai
    count: 3

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 5
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: coin-ai
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3

configMapGenerator:
  - name: app-config
    files:
      - env=prod.env
    behavior: merge

secretGenerator:
  - name: db-credentials
    files:
      - db-secret.txt
    behavior: merge

