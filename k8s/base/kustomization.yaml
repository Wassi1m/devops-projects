apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: coin-system

namespace: coin-system

resources:
  - namespace.yaml
  - database.yaml
  - api.yaml
  - ai.yaml
  - prometheus.yaml
  - grafana.yaml
  - loki.yaml
  - observability.yaml
  - alertmanager.yaml
  - ingress.yaml

labels:
  - pairs:
      app.kubernetes.io/name: coin-system
      app.kubernetes.io/version: "1.0.0"
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
    includeTemplates: true

commonAnnotations:
  security.istio.io/tlsMode: "ISTIO_MUTUAL"

images:
  - name: bourseia-api
    newTag: latest
  - name: coin-ai
    newTag: latest

replicas:
  - name: api
    count: 3
  - name: coin-ai
    count: 2


