apiVersion: apps/v1
kind: Deployment
metadata:
  name: coin-ai
  namespace: coin-system
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: coin-ai
  template:
    metadata:
      labels:
        app: coin-ai
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - coin-ai
              topologyKey: kubernetes.io/hostname

      containers:
      - name: coin-ai
        image: coin-ai:latest
        imagePullPolicy: Never   # ✅ IMPORTANT for Minikube
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP

        env:
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PYTHONUNBUFFERED
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: OTEL_EXPORTER_OTLP_ENDPOINT
        - name: OTEL_SERVICE_NAME
          value: "coin-ai"

        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        volumeMounts:
        - name: models
          mountPath: /app/models
          readOnly: true
        - name: dataset
          mountPath: /app/data_set
          readOnly: true

      volumes:
      - name: models
        emptyDir: {}
      - name: dataset
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: coin-ai
  namespace: coin-system
  labels:
    app: coin-ai
spec:
  type: ClusterIP
  selector:
    app: coin-ai
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: coin-ai-hpa
  namespace: coin-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: coin-ai
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: coin-ai-pdb
  namespace: coin-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: coin-ai

