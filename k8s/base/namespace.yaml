apiVersion: v1
kind: Namespace
metadata:
  name: coin-system
  labels:
    name: coin-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: coin-system
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  PYTHONUNBUFFERED: "1"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: coin-system
type: Opaque
stringData:
  db-user: bourseia
  db-password: "secret123"
  db-name: bourseia_db

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: coin-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: coin-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: coin-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-pvc
  namespace: coin-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

